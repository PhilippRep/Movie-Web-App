{% extends "base.html" %}
{% block title %}
Users
{% endblock %}
{% block content %}
<h1>Users</h1>
<ul class="user-list">
    {% for user in users %}
    <li class="user-entry">
        <a href="{{ url_for('get_movies', user_id=user.id) }}" class="btn">
            {{ user.name }}
        </a>
    </li>
    {% endfor %}
</ul>
<div class="add-user-container">
    <form action="{{ url_for('create_user') }}" method="POST">
        <h2>Add New User</h2>
        <input type="text" name="title" placeholder="User name">
        <button type="submit">Absenden</button>
    </form>
</div>
{% endblock %}
